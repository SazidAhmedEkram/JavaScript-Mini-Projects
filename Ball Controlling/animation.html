<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation</title>
  <style>
    *{
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    h1{
      color: rgb(64, 57, 70);
      margin-bottom: 10%;
    }
    #container{
      height: 500px;
      width: 500px;
      position: relative;
      background-color: rgb(64, 57, 70);
      margin: 4px;
      border: 9px solid rgb(213, 207, 229);
    }
    #animation{
      height: 50px;
      width: 50px;
      border-radius: 50%;
      position: absolute;
      background-color: rgb(220, 249, 255);
    }
    #right-button {
      height: 40px;
      width: 40px;
    }
    #right-bottom-button{
      height: 40px;
      width: 40px;
      transform: rotate(45deg);
    }
    #bottom-button{
      height: 40px;
      width: 40px;
      transform: rotate(90deg);
    }
    button{
      background-color: rgb(221, 238, 255);
      border: 5px solid rgb(64, 57, 70);
    }
  </style>
</head>
<body>
  <div class="mainContainer">
    <h1>JavaScript Ball Controlling</h1>
    <button id="Right-Bottom">
      <image id="right-bottom-button" src="controlling.png"></image>
    </button>
    <button id="Right">
      <image id="right-button" src="controlling.png"></image>
    </button>
    <button id="Bottom">
      <image id="bottom-button" src="controlling.png"></image>
    </button>
    <br> <br>
    <div id="container">
      <div id="animation"></div>
    </div>
    <p id="cordinate"></p>
  </div>
  
  <script>
    let rightBottom = document.getElementById("Right-Bottom");
    let right = document.getElementById("Right");
    let bottom = document.getElementById("Bottom");

    rightBottom.addEventListener("click", moveRightBottom);
    right.addEventListener("click", moveRight);
    bottom.addEventListener("click", moveBottom);

    let animate = document.getElementById("animation");
    let xAxis = 0;
    let yAxis = 0;
    let side = 0;
    let maximumBounds = 500 - 50 + 1;
    let minimumBounds = -1;
    document.getElementById("cordinate").innerHTML = xAxis + ", " + yAxis;
    function move(top, left){
      let id = null;
      // clearInterval(id);
      id = setInterval(frame, 3);
      
      function moveTheBox(){
        if(top == true && left == true){
              if(side == 0){
                yAxis++;
                xAxis++;
              }else if(side == 2){
                yAxis--;
                xAxis--;
              }else if(side == 1){
                yAxis++;
                xAxis--;
              }else if(side == 3){
                yAxis--;
                xAxis++;
              }
              
              animate.style.top = yAxis + "px";
              animate.style.left = xAxis + "px";
            }
            else if(top == false && left == true){
              if(side == 0 || side == 3){
                xAxis++;
              }else if(side == 2 || side == 1){
                xAxis--;
              }
              animate.style.left = xAxis + "px";
            }
            else{
              if(side == 0 || side ==1){
                yAxis++;
              }else if(side == 2 || side == 3){
                yAxis--;
              }
              animate.style.top = yAxis + "px";
            }
        document.getElementById("cordinate").innerHTML = xAxis + ", " + yAxis;
      }
      
      function frame(){
        if(side == 0){
          if(yAxis == maximumBounds || xAxis == maximumBounds){
            clearInterval(id);
            if(yAxis == maximumBounds && xAxis == maximumBounds){
              side = 2;
            }else if(yAxis == maximumBounds){
              side = 3;
            }else if(xAxis == maximumBounds){
              side = 1;
            }
          }
          moveTheBox();
        }
        else if(side == 2){
          if(yAxis == minimumBounds || xAxis == minimumBounds){
            clearInterval(id);
            if(yAxis == minimumBounds && xAxis == minimumBounds){
              side = 0;
            }else if(yAxis == minimumBounds){
              side = 1;
            }else if(xAxis == minimumBounds){
              side = 3;
            }
          }
          moveTheBox();
        }
      else if(side == 1){
          if(yAxis == maximumBounds || xAxis == minimumBounds){
            clearInterval(id);
            if(yAxis == maximumBounds && xAxis == minimumBounds){
              side = 3;
            }else if(yAxis == maximumBounds){
              side = 2;
            }else if(xAxis == minimumBounds){
              side = 0;
            }
          }
          moveTheBox();
        }
      else if(side == 3){
          if(yAxis == minimumBounds || xAxis == maximumBounds){
            clearInterval(id);
            if(yAxis == minimumBounds && xAxis == maximumBounds){
              side = 1;
            }else if(yAxis == minimumBounds){
              side = 0;
            }else if(xAxis == maximumBounds){
              side = 2;
            }
          }
          moveTheBox();
        }
      }
    }
    function moveRightBottom(){
      move(true, true);
    }
    function moveRight(){
      move(false, true);
    }
    function moveBottom(){
      move(true, false);
    }
  </script>
</body>
</html>
